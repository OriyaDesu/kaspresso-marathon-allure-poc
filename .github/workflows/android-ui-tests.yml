name: Android UI Tests

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  android-ui-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install Marathon CLI
        run: |
          curl -L \
            https://github.com/MarathonLabs/marathon/releases/download/0.10.4/marathon-0.10.4.zip \
            -o marathon.zip

          unzip marathon.zip
          echo "$PWD/marathon-0.10.4/bin" >> "$GITHUB_PATH"

          ./marathon-0.10.4/bin/marathon --help

      - name: Run UI tests
        uses: ReactiveCircus/android-emulator-runner@v2.37.0
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          emulator-boot-timeout: 900
          emulator-options: >-
            -no-window
            -no-audio
            -no-boot-anim
            -gpu swiftshader_indirect
            -camera-back none
            -no-snapshot-save
          script: |
            adb devices
            ./gradlew runMarathonWithMergedAllure --stacktrace

      - name: Upload merged Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: merged-allure-results
          path: build/reports/marathon/merged-allure-results
          if-no-files-found: warn
          retention-days: 14

      - name: Upload full Marathon report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: marathon-report
          path: build/reports/marathon
          if-no-files-found: warn
          retention-days: 14