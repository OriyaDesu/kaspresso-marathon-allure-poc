name: Android UI Tests

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  android-ui-tests:
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Install Marathon CLI
        run: |
          brew tap malinskiy/tap
          brew install malinskiy/tap/marathon
          marathon --version

      - name: Run UI tests
        uses: ReactiveCircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          emulator-boot-timeout: 900
          script: |
            adb devices
            ./gradlew runMarathonWithMergedAllure --stacktrace

      - name: Upload merged Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: merged-allure-results
          path: build/reports/marathon/merged-allure-results
          if-no-files-found: warn
          retention-days: 14

      - name: Upload full Marathon report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: marathon-report
          path: build/reports/marathon
          if-no-files-found: warn
          retention-days: 14